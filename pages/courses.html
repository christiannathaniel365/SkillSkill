<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/app.css" />
    <link rel="stylesheet" href="../css/courses.css" />
    <script
      src="https://kit.fontawesome.com/2ead1ef7ac.js"
      crossorigin="anonymous"
    ></script>
    <script src="../js/component.js" defer></script>
    <script src="../js/card.js" defer></script>
    <link rel="icon" href="../assets/LogoNavbar.png" />
    <title>SkillSkill</title>
  </head>
  <body>
    <header id="courses"></header>
    <main>
      <section id="jumbotron">
        <div class="jumbotronTitle">
          <h2>Explore Our Courses</h2>
          <p>
            Browse our courses and start learning with structured lessons, real
            projects, and hands-on experience.
          </p>
        </div>
        <div class="jumbotronImg">
          <img src="../assets/maskot/capy (3).webp" alt="" />
        </div>
      </section>
      <section id="allCourse">
        <div class="filterCourse">
          <div class="searchBox">
            <input type="text" class="inp" placeholder="Search Courses" />
            <button>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                <path
                  d="M480 272C480 317.9 465.1 360.3 440 394.7L566.6 521.4C579.1 533.9 579.1 554.2 566.6 566.7C554.1 579.2 533.8 579.2 521.3 566.7L394.7 440C360.3 465.1 317.9 480 272 480C157.1 480 64 386.9 64 272C64 157.1 157.1 64 272 64C386.9 64 480 157.1 480 272zM272 416C351.5 416 416 351.5 416 272C416 192.5 351.5 128 272 128C192.5 128 128 192.5 128 272C128 351.5 192.5 416 272 416z"
                />
              </svg>
            </button>
          </div>
          <div class="optCourses">
            <select name="" class="inp" id="">
              <option value="">Most Popular</option>
              <option value="">Free Courses</option>
            </select>
          </div>
        </div>
        <div class="allCard">
         <p class="summaryCourse"></p>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer></footer>
  </body>
</html>
